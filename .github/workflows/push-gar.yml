name: Build and push service images to Artifact Registry

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: project-12f4b54b-d692-4583-83b
  GAR_REGION: asia-south1
  GAR_REPOSITORY: apps

jobs:
  build-push:
    if: github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - kdms-main
          - kdms-api
          - kdms-reports
          - kdms-ocr
          - kdms-registration
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve build context
        id: cfg
        run: |
          set -euo pipefail
          case "${{ matrix.service }}" in
            kdms-main|kdms-api)
              echo "context=." >> "$GITHUB_OUTPUT"
              echo "dockerfile=./Dockerfile" >> "$GITHUB_OUTPUT"
              ;;
            kdms-reports)
              test -d "Services/kdms-reports" || { echo "::error::Services/kdms-reports not found in repo"; exit 1; }
              test -f "Services/kdms-reports/Dockerfile" || { echo "::error::Services/kdms-reports/Dockerfile is required (must listen on \$PORT for Cloud Run)"; exit 1; }
              echo "dockerfile=./Services/kdms-reports/Dockerfile" >> "$GITHUB_OUTPUT"
              echo "context=./Services/kdms-reports" >> "$GITHUB_OUTPUT"
              ;;
            kdms-registration)
              test -d "Services/kdms-registration" || { echo "::error::Services/kdms-registration not found"; exit 1; }
              test -f "Services/kdms-registration/Dockerfile" || { echo "::error::Services/kdms-registration/Dockerfile required"; exit 1; }
              echo "dockerfile=./Services/kdms-registration/Dockerfile" >> "$GITHUB_OUTPUT"
              echo "context=./Services/kdms-registration" >> "$GITHUB_OUTPUT"
              ;;
            kdms-ocr)
              test -d "Services/kdms-ocr" || { echo "::error::Services/kdms-ocr not found in repo"; exit 1; }
              if [ ! -f "Services/kdms-ocr/Dockerfile" ]; then
                printf '%s\n' \
                  'FROM python:3.11-slim' \
                  'WORKDIR /app' \
                  'COPY requirements.txt /app/requirements.txt' \
                  'RUN pip install --no-cache-dir -r /app/requirements.txt' \
                  'COPY . /app' \
                  'ENV PYTHONUNBUFFERED=1' \
                  'EXPOSE 5001' \
                  'CMD ["python", "app.py"]' \
                  > /tmp/kdms-ocr.Dockerfile
                echo "dockerfile=/tmp/kdms-ocr.Dockerfile" >> "$GITHUB_OUTPUT"
              else
                echo "dockerfile=./Services/kdms-ocr/Dockerfile" >> "$GITHUB_OUTPUT"
              fi
              echo "context=./Services/kdms-ocr" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "::error::Unsupported service: ${{ matrix.service }}"
              exit 1
              ;;
          esac

      - name: Image URI
        id: meta
        run: |
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          URI="${GAR_REGION}-docker.pkg.dev/${PROJECT_ID}/${GAR_REPOSITORY}/${{ matrix.service }}"
          echo "short=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "uri=${URI}" >> "$GITHUB_OUTPUT"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ env.PROJECT_ID }}
          service_account: ci-builder-kdms@project-12f4b54b-d692-4583-83b.iam.gserviceaccount.com
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Docker login (Artifact Registry)
        run: gcloud auth configure-docker "${GAR_REGION}-docker.pkg.dev" --quiet

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        id: buildpush
        uses: docker/build-push-action@v6
        with:
          context: ${{ steps.cfg.outputs.context }}
          file: ${{ steps.cfg.outputs.dockerfile }}
          push: true
          tags: |
            ${{ steps.meta.outputs.uri }}:${{ steps.meta.outputs.short }}
            ${{ steps.meta.outputs.uri }}:branch-main

      - name: Verify image in Artifact Registry
        env:
          URI: ${{ steps.meta.outputs.uri }}
          DIGEST: ${{ steps.buildpush.outputs.digest }}
        run: |
          set -euo pipefail
          if [ -z "$DIGEST" ]; then echo "::error::Build did not emit a digest."; exit 1; fi
          DIGEST_NORM="$DIGEST"
          case "$DIGEST_NORM" in sha256:*);; *) DIGEST_NORM="sha256:${DIGEST_NORM}";; esac
          REF="${URI}@${DIGEST_NORM}"
          echo "::notice::${{ matrix.service }} digest: ${DIGEST_NORM}"
          echo "Full ref: ${REF}"
          gcloud artifacts docker images describe "${REF}" --format='value(name)' >/dev/null
          echo "OK — manifest present in ${PROJECT_ID} Artifact Registry."

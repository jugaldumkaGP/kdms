name: kdms

networks:
  kdms-public:
  kdms-private:
    internal: true

services:
  kdms-main:
    build:
      context: .
    image: kdms-main:local
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      PORT: 8080
      KDMS_APACHE_USE_PREFIX: "0"
      WEBROOT_URL: "http://localhost:8080/"
      API_BASE_URL: "http://localhost:8081/api/"
      KDMS_INTERNAL_ORIGIN: "http://kdms-api:8080"
      KDMS_DB_HOST: "host.docker.internal:3306"
      SESSION_DRIVER: "database"
      SESSION_LIFETIME: "28800"
      KDMS_SERVICE_KEY: "${KDMS_SERVICE_KEY:-local-dev-shared-key}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - kdms-api
      - kdms-registration
    networks:
      - kdms-public
      - kdms-private

  kdms-api:
    build:
      context: .
    image: kdms-api:local
    ports:
      - "8081:8080"
    env_file:
      - .env
    environment:
      PORT: 8080
      KDMS_APACHE_USE_PREFIX: "0"
      WEBROOT_URL: "http://localhost:8081/"
      API_BASE_URL: "http://localhost:8081/api/"
      KDMS_INTERNAL_ORIGIN: "http://127.0.0.1:8080"
      KDMS_REGISTRATION_URL: "http://kdms-registration:8080"
      KDMS_DB_HOST: "host.docker.internal:3306"
      SESSION_DRIVER: "database"
      SESSION_LIFETIME: "28800"
      KDMS_SERVICE_KEY: "${KDMS_SERVICE_KEY:-local-dev-shared-key}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - kdms-registration
    networks:
      - kdms-public
      - kdms-private

  # kdms-ocr removed Phase 6/7 — use kdms-registration OCR mock locally:
  # DOCUMENT_AI_PROCESSOR_ID=mock docker compose up kdms-registration

  kdms-registration:
    build:
      context: ./Services/kdms-registration
    image: kdms-registration:local
    ports:
      - "8083:8080"
    env_file:
      - .env
    environment:
      PORT: 8080
      DOCUMENT_AI_PROCESSOR_ID: mock
      KDMS_API_BASE_URL: "http://kdms-api:8080/api/"
      KDMS_DB_HOST: "host.docker.internal:3306"
      KDMS_DB_USER: "${KDMS_DB_USER:-kdms}"
      KDMS_DB_PASSWORD: "${KDMS_DB_PASSWORD:-kdms}"
      KDMS_DB_NAME: "${KDMS_DB_NAME:-kdms}"
      KDMS_SERVICE_KEY: "${KDMS_SERVICE_KEY:-local-dev-shared-key}"
      ACTIVE_EVENT_ID: "${KDMS_EVENT_ID:-2026JB}"
      KDMS_GCS_PHOTOS_BUCKET: "${KDMS_GCS_PHOTOS_BUCKET:-kdms-photos}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - kdms-api
    networks:
      - kdms-public
      - kdms-private

  kdms-reports:
    image: php:8.3-apache
    working_dir: /var/www/html
    command:
      - sh
      - -c
      - |
        cat > /var/www/html/index.php <<'PHP'
        <?php
        header('Location: /UI/login.php');
        exit;
        PHP
        apache2-foreground
    volumes:
      - ../kmreports:/var/www/html
    environment:
      KMREPORTS_LOCAL_ROOT: "http://localhost:8082/"
      KMREPORTS_WEBROOT_URL: "http://kdms-main:8080/"
      KMREPORTS_API_BASE_URL: "http://kdms-api:8080/api/"
      KDMS_SERVICE_KEY: "${KDMS_SERVICE_KEY:-local-dev-shared-key}"
    ports:
      - "8082:80"
    networks:
      - kdms-public
      - kdms-private
